<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Contribution Guide</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            color: #8b949e;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #388bfd;
        }

        button {
            padding: 12px 24px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        button:hover {
            background: #2ea043;
        }

        .error {
            background: #3d1a1a;
            border: 1px solid #f85149;
            color: #f85149;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .result {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 28px 32px;
            font-size: 15px;
            line-height: 1.7;
        }

        .result h1,
        .result h2,
        .result h3 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #21262d;
        }

        .result h1:first-child,
        .result h2:first-child,
        .result h3:first-child {
            margin-top: 0;
        }

        .result p {
            color: #c9d1d9;
            margin-bottom: 12px;
        }

        .result ul,
        .result ol {
            padding-left: 22px;
            margin-bottom: 14px;
            color: #c9d1d9;
        }

        .result li {
            margin-bottom: 6px;
        }

        .result li+li {
            margin-top: 4px;
        }

        .result code {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: "SFMono-Regular", Consolas, monospace;
            font-size: 13px;
            color: #79c0ff;
        }

        .result pre {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .result pre code {
            background: none;
            border: none;
            padding: 0;
            color: #79c0ff;
            font-size: 13px;
        }

        .result strong {
            color: #ffffff;
            font-weight: 600;
        }

        .result blockquote {
            border-left: 3px solid #388bfd;
            padding: 8px 16px;
            margin-bottom: 14px;
            background: #1c2128;
            border-radius: 0 6px 6px 0;
            color: #8b949e;
            font-style: italic;
        }

        .loading {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>First Contribution Guide</h1>
        <p class="subtitle">Paste a GitHub issue URL and we'll tell you exactly how to contribute to it.</p>

        <form method="POST">
            <div class="input-row">
                <input type="text" name="issue_url" placeholder="https://github.com/owner/repo/issues/42"
                    value="{{ issue_url }}" required />
                <button type="submit" id="submitBtn">Explain Issue</button>
            </div>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if result %}
        <div class="result">{{ result | safe }}</div>
        {% endif %}
    </div>
    <script>
        document.querySelector("form").addEventListener("submit", function () {
            const btn = document.getElementById("submitBtn");
            btn.textContent = "Explaining...";
            btn.disabled = true;
            btn.style.background = "#1a6e2e";
            btn.style.cursor = "not-allowed";
            btn.style.opacity = "0.8";
        });
    </script>
</body>

</html>
